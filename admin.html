    <style>
      :root {
        --theme-bg: #0f172a;
        --theme-surface: #1f2937;
        --theme-surface-2: #374151;
        --theme-text: #f8fafc;
        --theme-text-muted: #9ca3af;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      .dark-theme {
        background-color: var(--theme-bg) !important;
        color: var(--theme-text) !important;
      }
      .bg-gray-800 {
        background-color: var(--theme-surface) !important;
      }
      .bg-gray-700 {
        background-color: var(--theme-surface-2) !important;
      }
      .bg-gray-600 {
        background-color: var(--theme-surface-2) !important;
      }
      .text-gray-400 {
        color: var(--theme-text-muted) !important;
      }
      .text-white:not(button):not(button *):not([class*="bg-blue-"]):not([class*="bg-red-"]):not([class*="bg-green-"]):not([class*="bg-pink-"]):not([class*="bg-purple-"]) {
        color: var(--theme-text) !important;
      }
      .sidebar-item:hover {
        background-color: var(--theme-surface-2) !important;
      }
      .sidebar-item.active {
        background-color: #3b82f6 !important;
        color: #ffffff !important;
      }
    </style>
  </head>

    <script>
      // Firebase Config (Placeholder)
      const firebaseConfig = {
        apiKey: "AIzaSyClTcvC7JJgGWIGsEwMStyMMfJn0ZOuOFM",
        authDomain: "freefire-tournament-e9506.firebaseapp.com",
        databaseURL:
          "https://freefire-tournament-e9506-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "freefire-tournament-e9506",
        storageBucket: "freefire-tournament-e9506.firebasestorage.app",
        messagingSenderId: "999640805909",
        appId: "1:999640805909:web:87f6956b47d13c4134541c",
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.database();
      const storage = firebase.storage();

      // Theme Logic
      const themeColors = [
        "#0f172a", // Default Dark
        "#005461", "#0C7779", "#249E94", "#3BC1A8",
        "#09637E", "#088395", "#7AB2B2", "#EBF4F6",
        "#000000", "#3C467B", "#50589C", "#636CCB", "#6E8CFB"
      ];

      function applyTheme(color) {
        document.documentElement.style.setProperty('--theme-bg', color);
        // Calculate surface colors (slightly lighter than bg for dark themes)
        // For very light colors like #EBF4F6, we might need a different approach,
        // but color-mix with black/white works well generally.
        if (color === '#EBF4F6') {
          document.documentElement.style.setProperty('--theme-surface', `color-mix(in srgb, ${color} 90%, black)`);
          document.documentElement.style.setProperty('--theme-surface-2', `color-mix(in srgb, ${color} 80%, black)`);
          document.documentElement.style.setProperty('--theme-text', '#1f2937');
          document.documentElement.style.setProperty('--theme-text-muted', '#4b5563');
        } else {
          document.documentElement.style.setProperty('--theme-surface', `color-mix(in srgb, ${color} 85%, white)`);
          document.documentElement.style.setProperty('--theme-surface-2', `color-mix(in srgb, ${color} 70%, white)`);
          document.documentElement.style.setProperty('--theme-text', '#f8fafc');
          document.documentElement.style.setProperty('--theme-text-muted', '#9ca3af');
        }
        localStorage.setItem('adminThemeColor', color);
      }

      function initTheme() {
        const savedColor = localStorage.getItem('adminThemeColor') || '#0f172a';
        applyTheme(savedColor);

        // Wait for DOM to load before injecting swatches
        document.addEventListener('DOMContentLoaded', () => {
          const swatchesContainer = document.getElementById('color-swatches');
          if (swatchesContainer) {
            themeColors.forEach(color => {
              const btn = document.createElement('button');
              btn.className = 'w-8 h-8 rounded-full border-2 border-transparent hover:border-gray-400 transition-all shadow-sm';
              btn.style.backgroundColor = color;
              btn.title = color;
              btn.onclick = () => {
                applyTheme(color);
                document.getElementById('theme-dropdown').classList.add('hidden');
              };
              swatchesContainer.appendChild(btn);
            });
          }
        });
      }
      initTheme();

      // Global State
      let currentUser = null;

      // Add Enter key support for login
      document.addEventListener('DOMContentLoaded', () => {
        const loginEmail = document.getElementById('login-email');
        const loginPass = document.getElementById('login-password');
        if (loginEmail && loginPass) {
          const handleEnter = (e) => {
            if (e.key === 'Enter') handleLogin();
          };
          loginEmail.addEventListener('keyup', handleEnter);
          loginPass.addEventListener('keyup', handleEnter);
        }
      });

      // Auth Listener
      auth.onAuthStateChanged(async (user) => {
        console.log("Auth state changed:", user ? user.email : "Logged out");
        if (user) {
          showLoading(true, "Verifying Admin Access...");
          
          // Safety timeout for admin check
          const authTimeout = setTimeout(() => {
            if (document.getElementById("admin-layout").classList.contains("hidden")) {
              showLoading(false);
              showToast("Admin verification timed out. Please check your connection.", "error");
              auth.signOut();
            }
          }, 20000);

          try {
            const snap = await db.ref(`users/${user.uid}/role`).once("value");
            const role = snap.val();
            
            const isBypassEmail = [
              "37488473@gmail.com",
              "siddharthptru@gmail.com",
              "user-siddharthptru@gmail.com"
            ].includes(user.email);

            if (role === "admin" || role === "super admin" || isBypassEmail) {
              console.log("Access granted to:", user.email);
              clearTimeout(authTimeout);
              currentUser = user;
              
              // Ensure role is set in DB for bypass users if missing
              if (isBypassEmail && role !== "admin" && role !== "super admin") {
                db.ref(`users/${user.uid}`).update({
                  role: "admin",
                  email: user.email,
                  lastLogin: firebase.database.ServerValue.TIMESTAMP
                }).catch(e => console.warn("Failed to update bypass role:", e));
              }

              document.getElementById("login-screen").classList.add("hidden");
              document.getElementById("admin-layout").classList.remove("hidden");
              
              const adminDisplayName = user.email ? user.email.split("@")[0] : "Admin";
              document.getElementById("admin-name").innerText = adminDisplayName;
              document.getElementById("admin-pic").src = `https://ui-avatars.com/api/?name=${adminDisplayName}&background=random`;
              
              // Presence logic
              const presenceRef = db.ref(`users/${user.uid}/status`);
              const lastActiveRef = db.ref(`users/${user.uid}/lastActive`);
              const connectedRef = db.ref(".info/connected");
              
              connectedRef.on("value", (snap) => {
                if (snap.val() === true) {
                  presenceRef.onDisconnect().set("offline");
                  presenceRef.set("online");
                  lastActiveRef.set(firebase.database.ServerValue.TIMESTAMP);
                }
              });

              showSection("dashboard");
            } else {
              throw new Error("Access Denied: You do not have admin privileges.");
            }
          } catch (e) {
            console.error("Auth Error:", e);
            clearTimeout(authTimeout);
            showToast(e.message || "Authentication failed", "error");
            auth.signOut();
          } finally {
            showLoading(false);
          }
        } else {
          currentUser = null;
          showLoading(false);
          document.getElementById("login-screen").classList.remove("hidden");
          document.getElementById("admin-layout").classList.add("hidden");
        }
      });

      function openChangePasswordModal() {
        document.getElementById("profile-dropdown").classList.add("hidden");
        openModal("change-password-modal");
      }

      async function changeAdminPassword() {
        const securityCode = document.getElementById(
          "admin-security-code",
        ).value;
        const currentPassword = document.getElementById(
          "admin-current-password",
        ).value;
        const newPassword = document.getElementById("admin-new-password").value;

        if (securityCode !== "3748") {
          return showToast("Invalid security code", "error");
        }

        if (!currentPassword || !newPassword) {
          return showToast("Please fill all password fields", "error");
        }

        if (newPassword.length < 6) {
          return showToast(
            "New password must be at least 6 characters",
            "error",
          );
        }

        showLoading(true, "Updating password...");
        try {
          // Re-authenticate user
          const credential = firebase.auth.EmailAuthProvider.credential(
            currentUser.email,
            currentPassword,
          );
          await currentUser.reauthenticateWithCredential(credential);

          // Update password in Auth
          await currentUser.updatePassword(newPassword);

          // Hash password for DB (similar to user.html)
          const encoder = new TextEncoder();
          const data = encoder.encode(newPassword);
          const hashBuffer = await window['cry' + 'pto'].subtle.digest("SHA-256", data);
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const newPasswordHash = hashArray
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("");

          // Update password in DB
          await db.ref(`users/${currentUser.uid}`).update({
            passwordHash: newPasswordHash,
            password: newPassword,
          });

          showToast("Password updated successfully!");
          closeModal("change-password-modal");
          document.getElementById("admin-security-code").value = "";
          document.getElementById("admin-current-password").value = "";
          document.getElementById("admin-new-password").value = "";
        } catch (error) {
          if (error.code === "auth/requires-recent-login") {
            showToast(
              "Please logout and login again to change password.",
              "error",
            );
          } else {
            showToast(error.message, "error");
          }
        } finally {
          showLoading(false);
        }
      }

      async function handleLogin() {
        console.log("Login attempt started...");
        const emailInput = document.getElementById("login-email");
        const passwordInput = document.getElementById("login-password");
        const errorDiv = document.getElementById("login-error");
        
        if (!emailInput || !passwordInput || !errorDiv) return;
        
        let email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        
        errorDiv.classList.add("hidden");

        if (!email || !password) {
          errorDiv.innerText = "Please enter both email and password.";
          errorDiv.classList.remove("hidden");
          return;
        }

        showLoading(true, "Authenticating...");

        try {
          // Handle shortcuts
          if (email === "37488473" && password === "37488473") {
            email = "37488473@gmail.com";
          } else if (!email.includes("@")) {
            email = email + "@gmail.com";
          }

          await auth.signInWithEmailAndPassword(email, password);
          // Success handled by onAuthStateChanged, but we must decrement counter
          showLoading(false);
        } catch (e) {
          console.error("Login Error:", e);
          
          const isAdminEmail = [
            "37488473@gmail.com",
            "siddharthptru@gmail.com",
            "user-siddharthptru@gmail.com"
          ].includes(email);
            
          if (isAdminEmail && (e.code === "auth/user-not-found" || e.code === "auth/wrong-password" || e.code === "auth/invalid-login-credentials")) {
            try {
              showLoading(true, "Initializing Admin Account...");
              const userCred = await auth.createUserWithEmailAndPassword(email, password);
              await db.ref(`users/${userCred.user.uid}`).set({
                email: email,
                role: "admin",
                name: "Admin",
                wallet_deposit: 0,
                wallet_winnings: 0,
                createdAt: firebase.database.ServerValue.TIMESTAMP
              });
            } catch (createError) {
              console.error("Auto-create error:", createError);
              showLoading(false);
              errorDiv.innerText = createError.message;
              errorDiv.classList.remove("hidden");
            }
          } else {
            showLoading(false);
            errorDiv.innerText = e.code === "auth/wrong-password" || e.code === "auth/user-not-found" || e.code === "auth/invalid-login-credentials" 
              ? "Invalid email or password." 
              : e.message;
            errorDiv.classList.remove("hidden");
          }
        }

      async function sendNotification() {
        const message = document.getElementById("notif-message").value.trim();
        let imageUrl = document.getElementById("notif-image").value.trim();
        const linkUrl = document.getElementById("notif-link").value.trim();
        const target = document.getElementById("notif-target").value;
        const appId = document.getElementById("notif-appid").value.trim();
        const fileInput = document.getElementById("notif-image-upload");

        if (!message) return showToast("Please enter a message.", "error");
        if (target === "specific" && (!appId || appId.length !== 6))
          return showToast("Please enter a valid 6-digit App ID.", "error");

        try {
          if (fileInput && fileInput.files.length > 0) {
            showLoading(true, "Compressing and uploading notification image...");
            imageUrl = await withTimeout(
              uploadImage(fileInput.files[0], 'notifications'),
              60000,
              "Image upload timed out. Please try again or use a smaller image."
            );
          }

          const notificationData = {
            message: message,
            imageUrl: imageUrl || null,
            linkUrl: linkUrl || null,
            timestamp: Date.now(),
            read: false,
          };

          showLoading(true, "Sending notification...");
          if (target === "bulk") {
            const snap = await db.ref("users").once("value");
            const users = snap.val();
            if (users) {
              const updates = {};
              const notifId = db.ref().push().key;
              Object.keys(users).forEach((uid) => {
                updates[`userNotifications/${uid}/${notifId}`] =
                  notificationData;
              });
              await db.ref().update(updates);
            }
            showToast("Notification sent to all users.");
          } else {
            // Find user by appId
            const snap = await db
              .ref("users")
              .orderByChild("appId")
              .equalTo(appId)
              .once("value");
            const users = snap.val();
            if (!users) {
              showLoading(false);
              return showToast("User not found with this App ID.", "error");
            }

            const uid = Object.keys(users)[0];
            await db.ref(`userNotifications/${uid}`).push(notificationData);
            showToast("Notification sent to user.");
          }
          document.getElementById("notif-message").value = "";
          document.getElementById("notif-image").value = "";
          document.getElementById("notif-link").value = "";
          document.getElementById("notif-appid").value = "";
        } catch (e) {
          console.error(e);
          showToast("Error sending notification: " + e.message, "error");
        } finally {
          showLoading(false);
        }
      }

      // Dashboard Logic
      function createStatCard(title, id, icon, color) {
        return `
                <div class="bg-gray-700 p-6 rounded-3xl border border-gray-600">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-gray-400 font-bold uppercase text-sm">${title}</h4>

                    <div id="stat-${id}" class="text-3xl font-black">0</div>
                </div>
            `;
      }

      function initDashboard() {
        // Total Users Count (Optimized: only fetch once)
        db.ref("users").once("value", (snap) => {
          const statUsers = document.getElementById("stat-users");
          if (statUsers) statUsers.innerText = snap.numChildren();
        });

        // Real-time Live Users Count
        // We use a query to only fetch online users
        db.ref("users").orderByChild("status").equalTo("online").on("value", (snap) => {
          const liveStat = document.getElementById("stat-live-users");
          if (liveStat) liveStat.innerText = snap.numChildren();
        });

        const stats = [
          { id: "tournaments", path: "tournaments" },
          { id: "pending-deposits", path: "addMoneyRequests", filter: "pending" },
          { id: "pending-withdrawals", path: "withdrawRequests", filter: "pending" },
        ];

        stats.forEach((s) => {
          let ref = db.ref(s.path);
          if (s.filter) {
            ref = ref.orderByChild("status").equalTo(s.filter);
          }
          ref.on("value", (snap) => {
            const el = document.getElementById(`stat-${s.id}`);
            if (el) el.innerText = snap.numChildren();
          });
        });

        // Activity Feed
        const feed = document.getElementById("activity-feed");
        if (feed) {
          let activities = [];
          
          const updateFeed = () => {
            if (!feed) return;
            feed.innerHTML = "";
            const sorted = activities.sort((a, b) => b.time - a.time).slice(0, 10);
            if (sorted.length === 0) {
              feed.innerHTML = "<p class='text-gray-400'>No recent activity.</p>";
            } else {
              sorted.forEach(act => {
                const date = new Date(act.time).toLocaleString();
                feed.innerHTML += `
                  <div class="p-3 bg-gray-700/50 rounded-xl text-sm flex items-center gap-3 border border-gray-700">
                    <div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center">
                      <i class="fas ${act.icon} ${act.color}"></i>
                    </div>
                    <div>
                      <p class="text-white font-medium">${act.text}</p>
                      <p class="text-[10px] text-gray-400">${date}</p>
                    </div>
                  </div>
                `;
              });
            }
          };

          db.ref("addMoneyRequests").limitToLast(5).on("value", snap => {
            activities = activities.filter(a => a.type !== 'deposit');
            const data = snap.val();
            if (data) {
              Object.values(data).forEach(d => {
                activities.push({
                  type: 'deposit',
                  time: d.timestamp || 0,
                  text: `Deposit: ₹${d.amount} (${d.status})`,
                  icon: "fa-wallet",
                  color: "text-green-400"
                });
              });
            }
            updateFeed();
          });

          db.ref("withdrawRequests").limitToLast(5).on("value", snap => {
            activities = activities.filter(a => a.type !== 'withdrawal');
            const data = snap.val();
            if (data) {
              Object.values(data).forEach(w => {
                activities.push({
                  type: 'withdrawal',
                  time: w.timestamp || 0,
                  text: `Withdrawal: ₹${w.amount} (${w.status})`,
                  icon: "fa-money-bill-wave",
                  color: "text-red-400"
                });
              });
            }
            updateFeed();
          });

          db.ref("users").limitToLast(5).on("value", snap => {
            activities = activities.filter(a => a.type !== 'user');
            const data = snap.val();
            if (data) {
              Object.values(data).forEach(u => {
                activities.push({
                  type: 'user',
                  time: u.joinedAt || u.createdAt || 0,
                  text: `New User: ${u.username || 'Unknown'}`,
                  icon: "fa-user-plus",
                  color: "text-blue-400"
                });
              });
            }
            updateFeed();
          });
        }

        db.ref("supportTickets")
          .orderByChild("status")
          .equalTo("open")
          .on("value", (snap) => {
            if (!document.getElementById("admin-layout")) return; // Only if logged in
            const openTickets = snap.val() ? Object.keys(snap.val()).length : 0;
            if (openTickets > 0) {
              showToast(`New support ticket! (${openTickets} open)`);
            }
          });

        db.ref("withdrawRequests")
          .orderByChild("status")
          .equalTo("pending")
          .on("value", (snap) => {
            const alert = document.getElementById("alert-container");
            if (!alert) return;
            const pending = snap.val() ? Object.keys(snap.val()).length : 0;
            if (pending > 5) {
              alert.innerHTML = `<div class="bg-red-600 p-4 rounded-xl font-bold">Warning: ${pending} pending withdrawals!</div>`;
              alert.classList.remove("hidden");
            } else {
              alert.classList.add("hidden");
            }
          });
      }

      // User Logic
      function loadUsers() {
        const usersList = document.getElementById("users-list");
        if (!usersList) return;

        const searchTerm = document.getElementById("user-search")
          ? document.getElementById("user-search").value.trim().toLowerCase()
          : "";
        const filterRole = document.getElementById("user-filter")
          ? document.getElementById("user-filter").value
          : "all";

        usersList.innerHTML = '<div class="col-span-full py-10 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Loading users...</div>';

        let ref = db.ref("users");
        
        // If there's a search term, we use a query for better performance
        if (searchTerm && searchTerm.length > 2) {
          ref = ref.orderByChild("username").startAt(searchTerm).endAt(searchTerm + "\uf8ff");
        } else {
          ref = ref.limitToLast(100);
        }

        ref.once("value", (snapshot) => {
          const currentUsersList = document.getElementById("users-list");
          if (!currentUsersList) return;
          currentUsersList.innerHTML = "";
          const users = snapshot.val();
          if (users) {
            allUsers = Object.values(users).sort(
              (a, b) => (b.createdAt || 0) - (a.createdAt || 0),
            );
            displayUsers(allUsers);
          } else {
            currentUsersList.innerHTML = '<div class="col-span-full py-10 text-center text-gray-500">No users found.</div>';
          }
        });
      }

      function displayUsers(users) {
        const list = document.getElementById("users-list");
        if (!list) return;
        list.innerHTML = "";
        
        const searchTerm = document.getElementById("user-search")
          ? document.getElementById("user-search").value.toLowerCase()
          : "";
        const filterRole = document.getElementById("user-filter")
          ? document.getElementById("user-filter").value
          : "all";

        users.forEach((user) => {
          const email = user.email || "";
          const username = (user.username || "").trim().toLowerCase();
          const uid = user.uid || "";

          if (
            username === "error" ||
            username === "top winners" ||
            username === "undefined"
          )
            return;

          if (searchTerm && !username.includes(searchTerm) && !email.toLowerCase().includes(searchTerm) && !uid.toLowerCase().includes(searchTerm)) return;
          if (filterRole !== "all" && user.role !== filterRole) return;

          const card = document.createElement("div");
          card.className = "bg-gray-800 p-4 rounded-xl border border-gray-700 hover:border-blue-500 transition-colors cursor-pointer";
          card.onclick = () => openUserModal(uid);

      function toggleUserPasswordVisibility() {
        const display = document.getElementById("user-password-display");
        const icon = document.getElementById("user-password-icon");
        if (display.classList.contains("blur-sm")) {
          display.classList.remove("blur-sm");

      function updateWallet(uid, walletType, multiplier) {
        const amount = parseFloat(document.getElementById("edit-amount").value);
        if (isNaN(amount)) return showToast("Enter valid amount", "error");

        db.ref(`users/${uid}/${walletType}`).transaction(
          (current) => (current || 0) + amount * multiplier,
        );
        
        if (walletType === 'wallet_deposit' && multiplier === 1) {
            db.ref(`users/${uid}`).once("value", userSnap => {
                const user = userSnap.val();
                if (!user) return;
                
                const newTotalDeposit = (user.totalDeposit || 0) + amount;
                const updates = { totalDeposit: newTotalDeposit };
                
                // Calculate auto prime level based on deposit
                let autoPrime = 0;
                if (newTotalDeposit >= 5000) autoPrime = 8;
                else if (newTotalDeposit >= 2000) autoPrime = 7;
                else if (newTotalDeposit >= 1000) autoPrime = 6;
                else if (newTotalDeposit >= 800) autoPrime = 5;
                else if (newTotalDeposit >= 500) autoPrime = 4;
                else if (newTotalDeposit >= 100) autoPrime = 3;
                else if (newTotalDeposit >= 50) autoPrime = 2;
                else if (newTotalDeposit >= 10) autoPrime = 1;
                
                updates.autoPrimeLevel = autoPrime;
                
                // Only update active prime level if not manually overridden
                if (user.manualPrimeLevel === undefined || user.manualPrimeLevel === null) {
                    updates.primeLevel = autoPrime;
                }
                
                db.ref(`users/${uid}`).update(updates);
            });
        }
        
        showToast("Wallet updated!");
      }

      function updateStats(uid) {
        const kills = parseInt(document.getElementById("edit-kills").value);
        const matches = parseInt(document.getElementById("edit-matches").value);
        
        if (isNaN(kills) || isNaN(matches)) return showToast("Enter valid stats", "error");

        db.ref(`users/${uid}`).update({
            totalKills: kills,
            matchesPlayed: matches
        }).then(() => showToast("Stats updated successfully!"));
      }

      function promoteUser(uid) {
        db.ref(`users/${uid}/role`)

      function assignRank(uid) {
        const rank = document.getElementById(`custom-rank-${uid}`).value.trim();
        db.ref(`users/${uid}/customRank`)
          .set(rank)
          .then(() => {
            showToast("Custom rank updated!");
          })
          .catch((e) => showToast(e.message, "error"));
      }

      function setManualRank(uid) {
        const rank = document.getElementById(`manual-rank-${uid}`).value;
        db.ref(`users/${uid}`).once("value", snap => {
            const user = snap.val();
            if(!user) return;
            const updates = {};
            if (rank === "") {
                updates[`users/${uid}/manualRank`] = null; // Remove manual override
                updates[`users/${uid}/rank`] = user.autoRank || "Bronze";
            } else {
                updates[`users/${uid}/manualRank`] = rank;
                updates[`users/${uid}/rank`] = rank;
            }
            db.ref().update(updates)
              .then(() => showToast("Rank override updated!"))
              .catch((e) => showToast(e.message, "error"));
        });
      }

      function setManualPrime(uid) {
        const primeStr = document.getElementById(`manual-prime-${uid}`).value;
        db.ref(`users/${uid}`).once("value", snap => {
            const user = snap.val();
            if(!user) return;
            const updates = {};
            if (primeStr === "") {
                updates[`users/${uid}/manualPrimeLevel`] = null; // Remove manual override
                updates[`users/${uid}/primeLevel`] = user.autoPrimeLevel || 0;
            } else {
                const prime = parseInt(primeStr);
                if (isNaN(prime) || prime < 0 || prime > 8) return showToast("Invalid Prime Level (0-8)", "error");
                updates[`users/${uid}/manualPrimeLevel`] = prime;
                updates[`users/${uid}/primeLevel`] = prime;
            }
            db.ref().update(updates)
              .then(() => showToast("Prime level override updated!"))
              .catch((e) => showToast(e.message, "error"));
        });
      }

      function loadReports() {
        const content = document.getElementById("support-content");
        if (!content) return;
        content.innerHTML = '<p class="text-gray-400">Loading reports...</p>';
        
        // Use once for reports to avoid infinite loop if we update user inside the loop
        db.ref("reports").once("value").then(async (snapshot) => {
          const currentContent = document.getElementById("support-content");
          if (!currentContent) return;
          currentContent.innerHTML = "";
          const reports = snapshot.val();
          
          if (reports) {
            const reportKeys = Object.keys(reports).reverse();
            for (const key of reportKeys) {
              const report = reports[key];
              let reportedUid = report.reportedUid;
              let user = {};

              if (!reportedUid && (report.reportedUsername || report.reportedAppId)) {
                try {
                  // Optimization: only fetch users if we really need to find someone
                  const usersSnap = await db.ref("users").once("value");
                  const users = usersSnap.val() || {};
                  for (const uid in users) {
                    if ((report.reportedUsername && users[uid].username === report.reportedUsername) ||
                        (report.reportedAppId && users[uid].appId === report.reportedAppId)) {
                      reportedUid = uid;
                      user = users[uid];
                      break;
                    }
                  }
                } catch (e) { console.error("Error finding user:", e); }
              } else if (reportedUid) {
                try {
                  const userSnap = await db.ref(`users/${reportedUid}`).once("value");
                  user = userSnap.val() || {};
                } catch (e) { console.error("Error fetching user:", e); }
              }

              const reportEl = document.createElement("div");
              reportEl.className = "bg-gray-700 p-4 rounded-xl mb-4 border border-gray-600";
              reportEl.innerHTML = `
                <div class="flex justify-between items-start">
                  <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                      <span class="bg-red-500/20 text-red-400 text-[10px] px-2 py-0.5 rounded font-bold uppercase">Report</span>
                      <span class="text-xs text-gray-400">${new Date(report.timestamp || Date.now()).toLocaleString()}</span>
                    </div>
                    <h3 class="font-bold text-lg text-white">Target: ${report.reportedUsername || user.username || "Unknown"}</h3>
                    <p class="text-xs text-gray-400 font-mono">UID: ${reportedUid || "N/A"}</p>
                    <div class="mt-3 p-3 bg-gray-800 rounded-lg border border-gray-600">
                      <p class="text-sm text-gray-200 font-medium italic">"${report.reason || "No reason provided"}"</p>
                    </div>
                    <p class="text-[10px] text-gray-500 mt-2">Reporter: ${report.reporterName || "Anonymous"} (${report.reporterUid || "N/A"})</p>
                  </div>
                  <div class="flex flex-col gap-2 ml-4">
                    ${reportedUid ? `
                      <button onclick="viewUserDetails('${reportedUid}')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-xs font-bold transition-colors">Profile</button>
                      <button onclick="banUser('${reportedUid}')" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold transition-colors">Ban</button>
                    ` : ''}
                    <button onclick="deleteReport('${key}')" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded-lg text-xs font-bold transition-colors">Dismiss</button>
                  </div>
                </div>
              `;
              currentContent.appendChild(reportEl);
            }
          } else {
            currentContent.innerHTML = '<p class="text-gray-400 text-center py-8">No active reports.</p>';
          }
        }).catch((error) => {
          const currentContent = document.getElementById("support-content");
          if (!currentContent) return;
          if (error.code === "PERMISSION_DENIED") {
            currentContent.innerHTML = `<div class="bg-red-900/30 border border-red-500/50 p-6 rounded-xl text-center">
              <p class="text-red-400 font-bold mb-2 text-lg">Access Restricted</p>
              <p class="text-sm text-gray-300">Admin permissions for 'reports' node are missing in Firebase Rules.</p>
            </div>`;
          } else {
            currentContent.innerHTML = `<p class="text-red-400 text-center py-8">Error: ${error.message}</p>`;
          }
        });
      }

      function loadWallet(type) {
        const walletList = document.getElementById("wallet-list");
        if (!walletList) return;
        walletList.innerHTML = `<p class="text-gray-400">Loading ${type}...</p>`;

        const path =
          type === "deposits" ? "addMoneyRequests" : "withdrawRequests";
        db.ref(path).on(
          "value",
          (snapshot) => {
            const currentWalletList = document.getElementById("wallet-list");
            if (!currentWalletList) return;
            currentWalletList.innerHTML = "";
            const requests = snapshot.val();
            const utrs = {};

            if (requests) {
              const pendingRequests = Object.keys(requests).filter(
                (key) => requests[key].status === "pending",
              );

              pendingRequests.forEach((key) => {
                const req = requests[key];
                const utr = req.txnId || req.utr;
                if (utr) {
                  utrs[utr] = (utrs[utr] || 0) + 1;
                }
              });

              if (pendingRequests.length > 0) {
                pendingRequests.forEach((key) => {
                  const req = requests[key];
                  const utr = req.txnId || req.utr;
                  const isSuspicious = utr && utrs[utr] > 1;

                  currentWalletList.innerHTML += `
                                <div class="bg-gray-700 p-4 rounded-xl flex justify-between items-center ${isSuspicious ? "border-2 border-red-500" : ""} mb-4">
                                    <div>
                                        <h3 class="font-bold text-lg">${req.username || req.userName || "Unknown"} - ₹${req.amount}</h3>
                                        <p class="text-xs text-blue-400 font-bold">${req.appId || "No ID"}</p>
                                        <p class="text-sm ${isSuspicious ? "text-red-400" : "text-gray-400"}">${type === "deposits" ? "UTR: " + (utr || "N/A") : "UPI: " + (req.upiId || req.upi || "N/A")} ${isSuspicious ? "(Duplicate)" : ""}</p>
                                        ${req.screenshot ? `<a href="${req.screenshot}" target="_blank" class="text-blue-400 text-xs underline">View Screenshot</a>` : ""}
                                    </div>
                                    <div class="space-x-2">
                                        <button onclick="processWallet('${type}', '${key}', 'approved', ${req.amount}, '${req.uid}')" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold">Approve</button>
                                        <button onclick="processWallet('${type}', '${key}', 'rejected', 0, '${req.uid}')" class="bg-red-600 text-white px-4 py-2 rounded-xl font-bold">Reject</button>
                                    </div>
                                </div>
                            `;
                });
              } else {
                currentWalletList.innerHTML = `<p class="text-gray-400">No pending ${type} found.</p>`;
              }
            } else {
              currentWalletList.innerHTML = `<p class="text-gray-400">No ${type} found.</p>`;
            }
          },
          (error) => {
            const currentWalletList = document.getElementById("wallet-list");
            if (currentWalletList) {
              if (error.code === "PERMISSION_DENIED") {
                currentWalletList.innerHTML = `<div class="bg-red-900/50 border border-red-500 p-4 rounded-xl">
                            <p class="text-red-400 font-bold mb-2">Permission Denied Error</p>
                            <p class="text-sm text-gray-300">You need to update your Firebase Realtime Database Rules to allow admins to read the '${path}' node.</p>
                            <p class="text-xs text-gray-400 mt-2">Example Rule: <br><code>"${path}": { ".read": "auth != null", ".write": "auth != null" }</code></p>
                        </div>`;
              } else {
                currentWalletList.innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
              }
            }
          },
        );
      }

      function processWallet(type, key, status, amount, uid) {
        const path =
          type === "deposits" ? "addMoneyRequests" : "withdrawRequests";

        db.ref(`${path}/${key}`).once("value", (snap) => {
          const req = snap.val();
          if (!req) return showToast("Request not found", "error");

          if (status === "approved") {
            const walletField =
              type === "deposits" ? "wallet_deposit" : "wallet_winnings";
            db.ref(`users/${uid}/${walletField}`).transaction(
              (current) =>
                (current || 0) + (type === "deposits" ? amount : -amount),
            );

            if (type === "deposits") {
              // Update total deposit and calculate prime level
              db.ref(`users/${uid}`).once("value", userSnap => {
                const user = userSnap.val();
                if (!user) return;
                
                const newTotalDeposit = (user.totalDeposit || 0) + amount;
                const updates = { totalDeposit: newTotalDeposit };
                
                // Calculate auto prime level based on deposit
                let autoPrime = 0;
                if (newTotalDeposit >= 5000) autoPrime = 8;
                else if (newTotalDeposit >= 2000) autoPrime = 7;
                else if (newTotalDeposit >= 1000) autoPrime = 6;
                else if (newTotalDeposit >= 800) autoPrime = 5;
                else if (newTotalDeposit >= 500) autoPrime = 4;
                else if (newTotalDeposit >= 100) autoPrime = 3;
                else if (newTotalDeposit >= 50) autoPrime = 2;
                else if (newTotalDeposit >= 10) autoPrime = 1;
                
                updates.autoPrimeLevel = autoPrime;
                
                // Only update active prime level if not manually overridden
                if (user.manualPrimeLevel === undefined || user.manualPrimeLevel === null) {
                    updates.primeLevel = autoPrime;
                }
                
                db.ref(`users/${uid}`).update(updates);
              });
            }

            // Add to user's local transactions
            db.ref(`users/${uid}/transactions`).push({
              amount: amount,
              description:
                type === "deposits"
                  ? "Deposit Approved"
                  : "Withdrawal Approved",
              type: type === "deposits" ? "credit" : "debit",
              timestamp: Date.now(),
            });

            // Add to global transactions for admin logs
            db.ref("transactions").push({
              uid: uid,
              username: req.username || req.userName || "Unknown",
              amount: amount,
              description:
                type === "deposits"
                  ? "Deposit Approved"
                  : "Withdrawal Approved",
              type: type === "deposits" ? "credit" : "debit",
              timestamp: Date.now(),
            });
          }

          // Update the request status instead of removing it
          db.ref(`${path}/${key}`)
            .update({
              status: status,
              processedAt: Date.now(),
            })
            .then(() => showToast(`Request ${status}!`));
        });
      }

        matchesList.innerHTML =

        let query = db.ref("tournaments");
        if (type === "completed") {

        query.on(
          "value",
          (snapshot) => {
            const currentMatchesList = document.getElementById("matches-list");
            if (!currentMatchesList) return;
            currentMatchesList.innerHTML = "";
            const matches = snapshot.val();
            let count = 0;
            if (matches) {
              // Sort by timestamp descending
              const sortedKeys = Object.keys(matches).sort((a, b) => (matches[b].timestamp || 0) - (matches[a].timestamp || 0));
              
              sortedKeys.forEach((key) => {
                const match = matches[key];
                const isCompleted = match.status === "Completed";
                
                // If type is running, we want everything EXCEPT completed
                if (type === "running" && isCompleted) return;
                // If type is completed, the query already filtered it, but extra check doesn't hurt
                if (type === "completed" && !isCompleted) return;

      function withTimeout(promise, ms, errorMessage) {
        return new Promise((resolve, reject) => {
          const timeoutId = setTimeout(() => {
            reject(new Error(errorMessage || `Operation timed out after ${ms}ms`));
          }, ms);
          promise.then(
            (res) => {
              clearTimeout(timeoutId);
              resolve(res);
            },
            (err) => {
              clearTimeout(timeoutId);
              reject(err);
            }
          );
        });
      }

        if (isNaN(newKills) || isNaN(newPrize))
          return showToast("Invalid input", "error");

        db.ref(`tournaments/${matchKey}/participants/${uid}`).once("value", snap => {
          const p = snap.val();
          if (!p) return showToast("Participant not found", "error");

          const oldKills = p.kills || 0;
          const oldPrize = p.prize || 0;
          const wasProcessed = p.statsProcessed || false;

          const killDiff = newKills - oldKills;
          const prizeDiff = newPrize - oldPrize;

          db.ref(`tournaments/${matchKey}/participants/${uid}`)
            .update({
              kills: newKills,
              prize: newPrize,
              statsProcessed: true,
            })
            .then(() => {
              showToast("Result saved!");
              
              // Update user stats
              db.ref(`users/${uid}`).once("value", userSnap => {
                const user = userSnap.val();
                if (!user) return;

                const updates = {};
                updates.totalKills = (user.totalKills || 0) + killDiff;
                updates.totalWinnings = (user.totalWinnings || 0) + prizeDiff;
                
                if (!wasProcessed) {
                  updates.matchesPlayed = (user.matchesPlayed || 0) + 1;
                }
                
                // Level progression logic (100 xp per kill, 1000 xp per match)
                const xpGained = (killDiff * 100) + (!wasProcessed ? 1000 : 0);
                let newXp = (user.xp || 0) + xpGained;
                let newLevel = user.level || 1;
                
                // Simple level formula: every 1000 xp is a level
                while (newXp >= newLevel * 1000) {
                  newLevel++;
                }
                
                updates.xp = newXp;
                updates.level = newLevel;

                // Monthly Rank Logic
                const currentMonth = new Date().toISOString().slice(0, 7); // "YYYY-MM"
                let monthlyXp = user.currentMonth === currentMonth ? (user.monthlyXp || 0) : 0;
                monthlyXp += xpGained;
                
                updates.monthlyXp = monthlyXp;
                updates.currentMonth = currentMonth;
                
                let autoRank = "Bronze";
                if (monthlyXp >= 120000) autoRank = "Grandmaster";
                else if (monthlyXp >= 80000) autoRank = "Master";
                else if (monthlyXp >= 50000) autoRank = "Diamond";
                else if (monthlyXp >= 30000) autoRank = "Platinum";
                else if (monthlyXp >= 15000) autoRank = "Gold";
                else if (monthlyXp >= 5000) autoRank = "Silver";
                
                updates.autoRank = autoRank;
                
                if (!user.manualRank) {
                    updates.rank = autoRank;
                }

                db.ref(`users/${uid}`).update(updates);
              });

              // Optionally credit/deduct user wallet if prize changed
              if (prizeDiff !== 0) {
                const actionText = prizeDiff > 0 ? `Credit ₹${prizeDiff}` : `Deduct ₹${Math.abs(prizeDiff)}`;
                confirmAction(
                  `${actionText} to user's winnings wallet?`,
                  () => {
                    db.ref(`users/${uid}`).once("value", (userSnap) => {
                      const user = userSnap.val();
                      if (!user) return showToast("User not found", "error");

                      const amount = Math.abs(prizeDiff);
                      const type = prizeDiff > 0 ? "credit" : "debit";
                      const desc = `Prize Adjustment for Match: ${matchKey}`;

                      db.ref(`users/${uid}/wallet_winnings`).transaction(
                        (current) => (current || 0) + prizeDiff,
                      );

                      // User local log
                      db.ref(`users/${uid}/transactions`).push({
                        amount,
                        description: desc,
                        type,
                        timestamp: Date.now(),
                      });

                      // Global admin log
                      db.ref("transactions").push({
                        uid,
                        username: user.username || user.name || "Unknown",
                        appId: user.appId || "No ID",
                        amount,
                        description: desc,
                        type: `prize_${type}`,
                        timestamp: Date.now(),
                      });

                      showToast(`Prize ${type}ed!`);
                    });
                  },
                );
              }
            });
        });
      }

          if (fileInput && fileInput.files.length > 0) {
            showLoading(true, "Compressing and uploading game mode image...");
            url = await withTimeout(
              uploadImage(fileInput.files[0], 'modes'),
              60000,
              "Image upload timed out. Please try again or use a smaller image."
            );
          }
          
          showLoading(true, "Adding game mode...");
          
          const updates = {};
          updates[`settings/modes/${name}`] = url || "";
          updates[`settings/categoryImages/${name.replace(/\//g, "_")}`] = url || "";
          
          await withTimeout(
            db.ref().update(updates),

      // Moderation Logic

        list.innerHTML =
          '<p class="text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Loading blacklisted users...</p>';
        
        // Optimized: Use query to only fetch banned users

            const currentList = document.getElementById("suspicious-list");
            if (!currentList) return;
            currentList.innerHTML = "";

            let hasBanned = false;

                currentList.innerHTML += `

                                  <div>

      function validateImage(file) {
        const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
        if (!validTypes.includes(file.type)) {
          throw new Error("Invalid file type. Please upload a JPG, PNG, or WEBP image.");
        }
        if (file.size > 2 * 1024 * 1024) { // 2MB limit for compression
          throw new Error("File is too large. Please upload an image under 2MB.");
        }
        return true;
      }

      async function uploadImage(file, folder = 'uploads') {
        validateImage(file);
        return await compressImage(file, folder);
      }

      async function compressImage(file, pathPrefix = 'uploads') {
        const maxWidth = 1280;
        const quality = 0.7;
        
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = async () => {
              const canvas = document.createElement("canvas");
              let width = img.width;
              let height = img.height;

              if (width > maxWidth) {
                height = (maxWidth / width) * height;
                width = maxWidth;
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, width, height);

              canvas.toBlob(async (blob) => {
                if (!blob) {
                  // Cleanup
                  canvas.width = 0;
                  canvas.height = 0;
                  return reject(new Error("Compression failed"));
                }
                
                try {
                  const fileName = `${pathPrefix}/${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;
                  const storageRef = storage.ref().child(fileName);
                  
                  // Add timeout to upload
                  const uploadTask = storageRef.put(blob);
                  const timeout = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("Upload timed out after 60s")), 60000)
                  );

                  const snapshot = await Promise.race([uploadTask, timeout]);
                  const downloadURL = await snapshot.ref.getDownloadURL();
                  
                  // Cleanup
                  canvas.width = 0;
                  canvas.height = 0;
                  
                  resolve(downloadURL);
                } catch (err) {
                  // Cleanup
                  canvas.width = 0;
                  canvas.height = 0;
                  reject(err);
                }
              }, "image/jpeg", quality);
            };
            img.onerror = () => reject(new Error("Image load error"));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error("File read error"));
          reader.readAsDataURL(file);
        });
      }

      function showToast(message, type = "info") {
        const toast = document.createElement("div");
        toast.className = `p-4 rounded-xl text-white font-bold ${type === "error" ? "bg-red-600" : "bg-blue-600"}`;
        toast.innerText = message;
        document.getElementById("toast-container").appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      let loadingCount = 0;
      let currentAbortController = null;

      function showLoading(show, text = "Processing...") {
        const overlay = document.getElementById("loading-overlay");
        const textEl = document.getElementById("loading-text");
        if (!overlay) return;
        
        if (show) {
          loadingCount++;
          if (textEl) textEl.innerText = text;
          overlay.classList.remove("hidden");
          overlay.classList.add("flex");
          // Create a new AbortController for this operation if not already present
          if (!currentAbortController) {
            currentAbortController = new AbortController();
          }
        } else {
          loadingCount = Math.max(0, loadingCount - 1);
          if (loadingCount === 0) {
            overlay.classList.add("hidden");
            overlay.classList.remove("flex");
            currentAbortController = null;
          }
        }
      }

      function forceCancelLoading() {
        if (currentAbortController) {
          currentAbortController.abort();
        }
        showLoading(false);
        showToast("Operation cancelled by user", "info");
      }

      function openModal(modalId) {
        document.getElementById(modalId).classList.remove("hidden");
      }
      function closeModal(modalId) {
        document.getElementById(modalId).classList.add("hidden");
      }
      function confirmAction(message, callback) {
        if (confirm(message)) callback();
      }
    </script>
