<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AddaClashX Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .dark-theme { background-color: #0f172a; color: #f8fafc; }
        .sidebar-item:hover { background-color: #1e293b; }
        .sidebar-item.active { background-color: #3b82f6; }
    </style>
</head>
<body class="dark-theme">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900/80 z-50 flex items-center justify-center hidden">
        <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-gray-900 z-40">
        <div class="bg-gray-800 p-8 rounded-3xl shadow-xl w-full max-w-sm border border-gray-700">
            <h2 class="text-2xl font-black text-white mb-6 uppercase text-center">Admin Login</h2>
            <div id="login-error" class="text-red-500 mb-4 text-sm hidden text-center"></div>
            <input type="text" id="login-email" placeholder="Username or Email" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-4 bg-gray-700 rounded-xl mb-6 text-white outline-none">
            <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl uppercase">Login</button>
        </div>
    </div>

    <!-- Admin Layout -->
    <div id="admin-layout" class="hidden flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 p-6 flex flex-col">
            <h1 class="text-xl font-black text-blue-500 mb-8 uppercase">AddaClashX Admin</h1>
            <nav class="space-y-2 flex-1">
                <button onclick="showSection('dashboard')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold active">Dashboard</button>
                <button onclick="showSection('analytics')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Analytics</button>
                <button onclick="showSection('users')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Users</button>
                <button onclick="showSection('moderation')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Moderation</button>
                <button onclick="showSection('tournaments')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Tournaments</button>
                <button onclick="showSection('wallet')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Wallet</button>
                <button onclick="showSection('bulk')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Bulk Tools</button>
                <button onclick="showSection('notifications')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Notifications</button>
                <button onclick="showSection('support')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Support</button>
                <button onclick="showSection('banners')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Banners</button>
                <button onclick="showSection('settings')" class="sidebar-item w-full text-left p-3 rounded-xl font-bold">Settings</button>
            </nav>
            <button onclick="handleLogout()" class="text-red-400 font-bold text-sm"><i class="fas fa-sign-out-alt mr-2"></i>Logout</button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-8">
                <h2 id="section-title" class="text-3xl font-black uppercase">Dashboard</h2>
                <div class="relative">
                    <button onclick="toggleProfileDropdown()" class="flex items-center space-x-3 bg-gray-700 p-2 rounded-full">
                        <img id="admin-pic" src="https://ui-avatars.com/api/?name=Admin" class="w-10 h-10 rounded-full">
                        <span id="admin-name" class="font-bold text-gray-200 pr-2"></span>
                    </button>
                    <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-gray-800 rounded-xl border border-gray-700 shadow-xl z-50">
                        <button onclick="handleLogout()" class="w-full text-left p-3 text-red-400 font-bold hover:bg-gray-700 rounded-xl">Logout</button>
                    </div>
                </div>
            </header>
            <div id="content-area" class="bg-gray-800 p-6 rounded-3xl border border-gray-700 min-h-[500px]">
                <!-- Dynamic Content -->
            </div>
        </main>
    </div>

    <!-- Create Match Modal -->
    <div id="create-match-modal" class="fixed inset-0 bg-gray-900/80 z-50 flex items-center justify-center hidden">
        <div class="bg-gray-800 p-8 rounded-3xl shadow-xl w-full max-w-lg border border-gray-700 max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-black text-white mb-6 uppercase text-center">Create Match</h2>
            <input type="text" id="match-name" placeholder="Title" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <select id="match-category" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
                <option value="">Select Mode</option>
            </select>
            <input type="number" id="match-entry" placeholder="Entry Fee" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <input type="number" id="match-prize" placeholder="Prize Pool" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <input type="number" id="match-perkill" placeholder="Per Kill Prize" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <input type="number" id="match-maxplayers" placeholder="Max Players" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <input type="datetime-local" id="match-time" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none">
            <textarea id="match-rules" placeholder="Rules" class="w-full p-4 bg-gray-700 rounded-xl mb-4 text-white outline-none"></textarea>
            <div class="mb-6">
                <input type="text" id="match-image" placeholder="Image URL" class="w-full p-4 bg-gray-700 rounded-xl mb-2 text-white outline-none">
                <p class="text-center text-gray-400 mb-2">OR</p>
                <input type="file" id="match-image-upload" accept="image/*" class="w-full text-gray-400">
            </div>
            <div class="flex space-x-4">
                <button onclick="closeModal('create-match-modal')" class="flex-1 py-4 bg-gray-600 text-white font-black rounded-xl uppercase">Cancel</button>
                <button onclick="createMatch()" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-xl uppercase">Create</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config (Placeholder)
        const firebaseConfig = {
          apiKey: "AIzaSyClTcvC7JJgGWIGsEwMStyMMfJn0ZOuOFM",
          authDomain: "freefire-tournament-e9506.firebaseapp.com",
          databaseURL: "https://freefire-tournament-e9506-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "freefire-tournament-e9506",
          storageBucket: "freefire-tournament-e9506.firebasestorage.app",
          messagingSenderId: "999640805909",
          appId: "1:999640805909:web:87f6956b47d13c4134541c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const storage = firebase.storage();

        // Global State
        let currentUser = null;

        // Auth Listener
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                showLoading(true);
                try {
                    const snap = await db.ref(`users/${user.uid}/role`).once('value');
                    const role = snap.val();
                    const isBypassEmail = user.email === '37488473@gmail.com' || user.email === 'siddharthptru@gmail.com';
                    
                    if (isBypassEmail && role !== 'admin' && role !== 'super admin') {
                        await db.ref(`users/${user.uid}`).update({
                            role: 'admin',
                            email: user.email,
                            name: user.displayName || 'Admin'
                        });
                    }

                    if (role === 'admin' || role === 'super admin' || isBypassEmail) {
                        currentUser = user;
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('admin-layout').classList.remove('hidden');
                        document.getElementById('admin-name').innerText = user.email ? user.email.split('@')[0] : 'Admin';
                        document.getElementById('admin-pic').src = `https://ui-avatars.com/api/?name=${user.email ? user.email.split('@')[0] : 'Admin'}`;
                        showSection('dashboard');
                    } else {
                        showToast("Access Denied: Admin only.", 'error');
                        auth.signOut();
                    }
                } catch (e) {
                    console.error(e);
                    const isBypassEmail = user.email === '37488473@gmail.com' || user.email === 'siddharthptru@gmail.com';
                    if (isBypassEmail) {
                        currentUser = user;
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('admin-layout').classList.remove('hidden');
                        document.getElementById('admin-name').innerText = 'Admin';
                        document.getElementById('admin-pic').src = `https://ui-avatars.com/api/?name=Admin`;
                        showSection('dashboard');
                    } else {
                        showToast("Error checking admin role.", 'error');
                        auth.signOut();
                    }
                } finally {
                    showLoading(false);
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-layout').classList.add('hidden');
            }
        });

        async function handleLogin() {
            let email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.add('hidden');
            
            if (!email || !password) {
                errorDiv.innerText = "Please enter both username/email and password.";
                errorDiv.classList.remove('hidden');
                return;
            }

            showLoading(true);

            if (email === '37488473' && password === '37488473') {
                email = '37488473@gmail.com';
            } else if (!email.includes('@')) {
                email = email + '@gmail.com';
            }

            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (e) {
                if (email === '37488473@gmail.com' && e.code === 'auth/user-not-found') {
                    try {
                        const userCred = await auth.createUserWithEmailAndPassword(email, password);
                        await db.ref(`users/${userCred.user.uid}`).set({
                            email: email,
                            role: 'admin',
                            name: 'Admin Bypass',
                            deposit: 0,
                            win: 0
                        });
                    } catch (createError) {
                        errorDiv.innerText = "Bypass user creation failed: " + createError.message;
                        errorDiv.classList.remove('hidden');
                    }
                } else {
                    errorDiv.innerText = e.message;
                    errorDiv.classList.remove('hidden');
                }
            } finally {
                showLoading(false);
            }
        }

        function handleLogout() {
            auth.signOut().then(() => {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-layout').classList.add('hidden');
            });
        }

        function toggleProfileDropdown() {
            document.getElementById('profile-dropdown').classList.toggle('hidden');
        }

        // Navigation
        function showSection(sectionId) {
            document.getElementById('section-title').innerText = sectionId.charAt(0).toUpperCase() + sectionId.slice(1);
            const contentArea = document.getElementById('content-area');
            
            document.querySelectorAll('.sidebar-item').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === sectionId);
            });

            if (sectionId === 'dashboard') {
                contentArea.innerHTML = `
                    <div id="alert-container" class="mb-6 hidden"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
                        ${createStatCard('Total Users', 'users', 'fa-users', 'text-blue-500')}
                        ${createStatCard('Live Users', 'live-users', 'fa-user-clock', 'text-green-400')}
                        ${createStatCard('Total Tournaments', 'tournaments', 'fa-trophy', 'text-yellow-500')}
                        ${createStatCard('Pending Deposits', 'deposits', 'fa-wallet', 'text-green-500')}
                        ${createStatCard('Pending Withdrawals', 'withdrawals', 'fa-money-bill-wave', 'text-red-500')}
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 bg-gray-700 p-6 rounded-3xl">
                            <h3 class="text-xl font-bold mb-4">Recent Activity</h3>
                            <div id="activity-feed" class="space-y-4"></div>
                        </div>
                        <div class="bg-gray-700 p-6 rounded-3xl">
                            <h3 class="text-xl font-bold mb-4">Quick Actions</h3>
                            <div class="space-y-3">
                                <button onclick="showSection('tournaments')" class="w-full p-4 bg-blue-600 rounded-xl font-bold">Create Tournament</button>
                                <button onclick="showSection('wallet')" class="w-full p-4 bg-green-600 rounded-xl font-bold">Approve Deposits</button>
                                <button onclick="showSection('banners')" class="w-full p-4 bg-pink-600 rounded-xl font-bold">Change Banners</button>
                                <button onclick="showSection('support')" class="w-full p-4 bg-purple-600 rounded-xl font-bold">View Support Tickets</button>
                            </div>
                        </div>
                    </div>
                `;
                initDashboard();
            } else if (sectionId === 'banners') {
                contentArea.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-gray-700 p-6 rounded-3xl">
                            <h3 class="text-xl font-bold mb-6">Update Mode Banner</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm text-gray-400 mb-2">Select Game Mode</label>
                                    <select id="banner-mode-select" class="w-full p-4 bg-gray-600 rounded-xl text-white outline-none border border-gray-500">
                                        <option value="">Select Mode</option>
                                        <option value="BATTLE ROYALE">BATTLE ROYALE</option>
                                        <option value="FF SURVIVAL">FF SURVIVAL</option>
                                        <option value="LOSS/HEAL LW">LOSS/HEAL LW</option>

                                        <option value="CS/LW 2V2">CS/LW 2V2</option>
                                        <option value="ONLY HEAD 1V1">ONLY HEAD 1V1</option>
                                        <option value="CS 4V4">CS 4V4</option>
                                        <option value="FIST FIGHT">FIST FIGHT</option>
                                        <option value="FREE MATCH">FREE MATCH</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm text-gray-400 mb-2">Banner Image URL</label>
                                    <input type="text" id="banner-url-input" placeholder="https://example.com/banner.jpg" class="w-full p-4 bg-gray-600 rounded-xl text-white outline-none border border-gray-500">
                                </div>
                                <button onclick="updateBanner()" class="w-full py-4 bg-blue-600 rounded-xl font-bold uppercase hover:bg-blue-700 transition">Save Banner</button>
                            </div>
                        </div>
                        <div class="bg-gray-700 p-6 rounded-3xl">
                            <h3 class="text-xl font-bold mb-6">Current Banners</h3>
                            <div id="banners-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                                <p class="text-gray-400 text-center py-8">Loading banners...</p>
                            </div>
                        </div>
                    </div>
                `;
                loadBanners();
            } else if (sectionId === 'tournaments') {
                contentArea.innerHTML = `
                    <div class="flex space-x-4 mb-6">
                        <button onclick="openCreateMatchModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold uppercase">Create Match</button>
                        <button onclick="loadMatches('running')" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Running</button>
                        <button onclick="loadMatches('completed')" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Completed</button>
                    </div>
                    <div id="matches-list" class="space-y-4">
                        <!-- Matches will be loaded here -->
                    </div>
                `;
                loadMatches('running');
            } else if (sectionId === 'wallet') {
                contentArea.innerHTML = `
                    <div class="flex space-x-4 mb-6">
                        <button onclick="loadWallet('deposits')" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Deposits</button>
                        <button onclick="loadWallet('withdrawals')" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Withdrawals</button>
                        <button onclick="loadManualWallet()" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Manual Wallet</button>
                        <button onclick="loadTransactionLogs()" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Logs</button>
                    </div>
                    <div id="wallet-list" class="space-y-4">
                        <!-- Wallet requests will be loaded here -->
                    </div>
                `;
                loadWallet('deposits');
            } else if (sectionId === 'users') {
                contentArea.innerHTML = `
                    <div class="mb-6 flex gap-4">
                        <input type="text" id="user-search" placeholder="Search by username, email, UID..." class="flex-1 p-3 bg-gray-700 rounded-xl text-white outline-none">
                        <select id="user-filter" class="p-3 bg-gray-700 rounded-xl text-white outline-none">
                            <option value="all">All Roles</option>

                    <div id="users-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                `;
                document.getElementById('user-search').addEventListener('input', loadUsers);
                document.getElementById('user-filter').addEventListener('change', loadUsers);
                loadUsers();
            } else if (sectionId === 'support') {
                contentArea.innerHTML = `
                    <div class="flex space-x-4 mb-6">
                        <button onclick="loadTickets()" class="bg-gray-700 text-white px-6 py-3 rounded-xl font-bold uppercase">Tickets</button>

                    </div>
                `;
                loadTickets();
            } else if (sectionId === 'settings') {
                contentArea.innerHTML = `

                            <input type="text" id="set-qr-url" placeholder="QR Code URL" class="w-full p-3 bg-gray-600 rounded-xl mb-2 text-white">

                        <div class="bg-gray-700 p-6 rounded-3xl">
                            <h3 class="text-xl font-bold mb-4">Game Modes & Banners</h3>
                            <div class="flex space-x-2 mb-4">
                                <input type="text" id="new-mode-name" placeholder="Mode Name (e.g., TDM, Classic)" class="flex-1 p-3 bg-gray-600 rounded-xl text-white">
                                <input type="text" id="new-mode-url" placeholder="Banner Image URL" class="flex-1 p-3 bg-gray-600 rounded-xl text-white">
                                <button onclick="addGameMode()" class="bg-green-600 px-4 py-2 rounded-xl font-bold">Add Mode</button>
                            </div>
                            <div class="space-y-4" id="category-images-list">
                                <!-- Loaded dynamically -->
                            </div>
                        </div>
                    </div>
                `;
                loadSettings();
            } else if (sectionId === 'analytics') {
                contentArea.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div class="bg-gray-700 p-6 rounded-3xl">
                            <h3 class="text-xl font-bold mb-4">User Growth</h3>
                            <div id="user-growth-stats" class="space-y-4">Loading...</div>
                        </div>

                            <h3 class="text-xl font-bold mb-4">Revenue & Matches</h3>
                            <div id="revenue-stats" class="space-y-4">Loading...</div>

                `;
                loadAnalytics();
            } else if (sectionId === 'moderation') {
                contentArea.innerHTML = `
                    <div class="mb-6">
                        <h3 class="text-xl font-bold mb-4">Suspicious Activity & Blacklist</h3>
                        <div class="flex space-x-4 mb-4">
                            <input type="text" id="blacklist-uid" placeholder="UID to Blacklist" class="flex-1 p-3 bg-gray-700 rounded-xl text-white outline-none">
                            <button onclick="addToBlacklist()" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold uppercase">Blacklist</button>
                        </div>
                    </div>
                    <div id="suspicious-list" class="space-y-4">
                        <!-- Suspicious users will be loaded here -->
                    </div>
                `;
                loadModeration();
            } else if (sectionId === 'bulk') {
                contentArea.innerHTML = `
                    <div class="space-y-6">

                            <h3 class="text-xl font-bold mb-4 text-red-400">Danger Zone</h3>
                            <button onclick="bulkDeleteMatches()" class="w-full p-3 bg-red-800 rounded-xl font-bold">Delete All Completed Matches</button>

        async function sendNotification() {
            const message = document.getElementById('notif-message').value.trim();
            const target = document.getElementById('notif-target').value;
            const appId = document.getElementById('notif-appid').value.trim();

            if (!message) return showToast("Please enter a message.", "error");
            if (target === 'specific' && (!appId || appId.length !== 6)) return showToast("Please enter a valid 6-digit App ID.", "error");

            const notificationData = {
                message: message,
                timestamp: Date.now(),
                read: false
            };

            try {
                showLoading(true);
                if (target === 'bulk') {
                    const snap = await db.ref('users').once('value');
                    const users = snap.val();
                    if (users) {
                        const updates = {};
                        const notifId = db.ref().push().key;
                        Object.keys(users).forEach(uid => {
                            updates[`userNotifications/${uid}/${notifId}`] = notificationData;
                        });
                        await db.ref().update(updates);
                    }
                    showToast("Notification sent to all users.");
                } else {
                    // Find user by appId
                    const snap = await db.ref('users').orderByChild('appId').equalTo(appId).once('value');
                    const users = snap.val();
                    if (!users) {
                        showLoading(false);
                        return showToast("User not found with this App ID.", "error");
                    }
                    
                    const uid = Object.keys(users)[0];
                    await db.ref(`userNotifications/${uid}`).push(notificationData);
                    showToast("Notification sent to user.");
                }
                document.getElementById('notif-message').value = '';
                document.getElementById('notif-appid').value = '';
            } catch (e) {
                console.error(e);
                showToast("Error sending notification: " + e.message, "error");
            } finally {
                showLoading(false);
            }
        }

        // Wallet Logic
        function loadWallet(type) {
            const walletList = document.getElementById('wallet-list');
            if (!walletList) return;
            walletList.innerHTML = `<p class="text-gray-400">Loading ${type}...</p>`;
            
            const path = type === 'deposits' ? 'addMoneyRequests' : 'withdrawRequests';
            db.ref(path).on('value', (snapshot) => {
                const currentWalletList = document.getElementById('wallet-list');
                if (!currentWalletList) return;
                currentWalletList.innerHTML = '';
                const requests = snapshot.val();
                const utrs = {};
                
                if (requests) {
                    const pendingRequests = Object.keys(requests).filter(key => requests[key].status === 'pending');
                    
                    pendingRequests.forEach(key => {
                        const req = requests[key];
                        const utr = req.txnId || req.utr;
                        if (utr) {
                            utrs[utr] = (utrs[utr] || 0) + 1;
                        }
                    });

                    if (pendingRequests.length > 0) {
                        pendingRequests.forEach(key => {
                            const req = requests[key];
                            const utr = req.txnId || req.utr;
                            const isSuspicious = utr && utrs[utr] > 1;
                            
                            currentWalletList.innerHTML += `
                                <div class="bg-gray-700 p-4 rounded-xl flex justify-between items-center ${isSuspicious ? 'border-2 border-red-500' : ''} mb-4">

                                        <p class="text-xs text-blue-400 font-bold">${req.appId || 'No ID'}</p>
                                        <p class="text-sm ${isSuspicious ? 'text-red-400' : 'text-gray-400'}">${type === 'deposits' ? 'UTR: ' + (utr || 'N/A') : 'UPI: ' + (req.upiId || req.upi || 'N/A')} ${isSuspicious ? '(Duplicate)' : ''}</p>
                                        ${req.screenshot ? `<a href="${req.screenshot}" target="_blank" class="text-blue-400 text-xs underline">View Screenshot</a>` : ''}
                                    </div>
                                    <div class="space-x-2">
                                        <button onclick="processWallet('${type}', '${key}', 'approved', ${req.amount}, '${req.uid}')" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold">Approve</button>
                                        <button onclick="processWallet('${type}', '${key}', 'rejected', 0, '${req.uid}')" class="bg-red-600 text-white px-4 py-2 rounded-xl font-bold">Reject</button>
                                    </div>
                                </div>
                            `;
                        });
                    } else {
                        currentWalletList.innerHTML = `<p class="text-gray-400">No pending ${type} found.</p>`;
                    }
                } else {
                    currentWalletList.innerHTML = `<p class="text-gray-400">No ${type} found.</p>`;
                }
            }, (error) => {
                const currentWalletList = document.getElementById('wallet-list');
                if (currentWalletList) currentWalletList.innerHTML = `<p class="text-red-400">Error: ${error.message}</p>`;
            });
        }

        function processWallet(type, key, status, amount, uid) {
            const path = type === 'deposits' ? 'addMoneyRequests' : 'withdrawRequests';
            
            db.ref(`${path}/${key}`).once('value', (snap) => {
                const req = snap.val();
                if (!req) return showToast('Request not found', 'error');

                if (status === 'approved') {
                    const walletField = type === 'deposits' ? 'wallet_deposit' : 'wallet_winnings';
                    db.ref(`users/${uid}/${walletField}`).transaction(current => (current || 0) + (type === 'deposits' ? amount : -amount));
                    
                    // Add to user's local transactions
                    db.ref(`users/${uid}/transactions`).push({
                        amount: amount,
                        description: type === 'deposits' ? 'Deposit Approved' : 'Withdrawal Approved',
                        type: type === 'deposits' ? 'credit' : 'debit',
                        timestamp: Date.now()
                    });

                    // Add to global transactions for admin logs
                    db.ref('transactions').push({
                        uid: uid,
                        username: req.username || req.userName || 'Unknown',
                        amount: amount,
                        description: type === 'deposits' ? 'Deposit Approved' : 'Withdrawal Approved',
                        type: type === 'deposits' ? 'credit' : 'debit',
                        timestamp: Date.now()
                    });
                }
                
                // Update the request status instead of removing it
                db.ref(`${path}/${key}`).update({ 
                    status: status,
                    processedAt: Date.now()
                }).then(() => showToast(`Request ${status}!`));
            });
        }

        function manualWalletAction(action) {
            const uid = document.getElementById('manual-uid').value.trim();
            const amount = parseFloat(document.getElementById('manual-amount').value);
            if (!uid || isNaN(amount)) return showToast('Fill all fields correctly', 'error');
            
            db.ref(`users/${uid}`).once('value', (snap) => {
                if (!snap.exists()) return showToast('User not found', 'error');
                const user = snap.val();
                
                db.ref(`users/${uid}/wallet_deposit`).transaction(current => (current || 0) + (action === 'credit' ? amount : -amount));
                
                // Add to user's local transactions
                db.ref(`users/${uid}/transactions`).push({
                    amount: amount,
                    description: `Manual ${action} by Admin`,
                    type: action === 'credit' ? 'credit' : 'debit',
                    timestamp: Date.now()
                });

        function loadMatches(type = 'running') {
            const matchesList = document.getElementById('matches-list');

                currentMatchesList.innerHTML = '';
                const matches = snapshot.val();
                let count = 0;
                if (matches) {
                    Object.keys(matches).forEach(key => {
                        const match = matches[key];
                        const isCompleted = match.status === 'Completed';
                        if (type === 'running' && isCompleted) return;
                        if (type === 'completed' && !isCompleted) return;
                        
                        count++;
                        currentMatchesList.innerHTML += `

                                <div class="flex justify-between items-start mb-4">

        function saveParticipantResult(matchKey, uid) {
            const kills = parseInt(document.getElementById(`kills-${uid}`).value);
            const prize = parseFloat(document.getElementById(`prize-${uid}`).value);
            
            if (isNaN(kills) || isNaN(prize)) return showToast('Invalid input', 'error');

            db.ref(`tournaments/${matchKey}/participants/${uid}`).update({
                kills,
                prize,
                statsProcessed: true
            }).then(() => {
                showToast('Result saved!');
                // Optionally credit user wallet if prize > 0
                if (prize > 0) {
                    confirmAction(`Credit ₹${prize} to user's winnings wallet?`, () => {
                        db.ref(`users/${uid}`).once('value', (userSnap) => {
                            const user = userSnap.val();
                            if (!user) return showToast('User not found', 'error');

                            const amount = prize;
                            const desc = `Prize for Match: ${matchKey}`;
                            
                            db.ref(`users/${uid}/wallet_winnings`).transaction(current => (current || 0) + amount);
                            
                            // User local log
                            db.ref(`users/${uid}/transactions`).push({
                                amount,
                                description: desc,
                                type: 'credit',
                                timestamp: Date.now()
                            });

                            // Global admin log
                            db.ref('transactions').push({
                                uid,
                                username: user.username || user.name || 'Unknown',
                                appId: user.appId || 'No ID',
                                amount,
                                description: desc,
                                type: 'prize_credit',
                                timestamp: Date.now()
                            });

                            showToast('Prize credited!');
                        });
                    });
                }
            });
        }

                const users = snap.val();

                            currentList.innerHTML += `
                                <div class="bg-gray-700 p-4 rounded-xl flex justify-between items-center mb-2">

        // Bulk Tools Logic
        function bulkCredit() {
            const amount = parseFloat(document.getElementById('bulk-amount').value);
            if (!amount) return showToast('Enter an amount', 'error');
            confirmAction(`Credit ₹${amount} to ALL users?`, () => {
                db.ref('users').once('value', (snap) => {
                    const users = snap.val();
                    if (users) {
                        const updates = {};
                        Object.keys(users).forEach(uid => {
                            updates[`${uid}/wallet_deposit`] = (users[uid].wallet_deposit || 0) + amount;
                        });
                        db.ref('users').update(updates).then(() => showToast('Bulk credit successful!'));
                    }
                });
            });
        }

        function bulkAnnounce() {
            const message = document.getElementById('bulk-message').value;
            if (!message) return showToast('Enter a message', 'error');
            db.ref('announcements').push({
                message,
                timestamp: Date.now(),
                sender: 'Admin',
                target: 'all'
            }).then(() => {
                showToast('Announcement sent!');
                document.getElementById('bulk-message').value = '';
            });
        }

        function bulkDeleteMatches() {
            confirmAction('Are you absolutely sure you want to delete ALL completed matches?', () => {
                db.ref('tournaments').orderByChild('status').equalTo('Completed').once('value', (snap) => {
                    const matches = snap.val();
                    if (matches) {
                        const updates = {};
                        Object.keys(matches).forEach(key => updates[key] = null);
                        db.ref('tournaments').update(updates).then(() => showToast('Completed matches deleted!'));
                    } else {
                        showToast('No completed matches found.');
                    }
                });
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl text-white font-bold ${type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`;
            toast.innerText = message;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showLoading(show) {
            const overlay = document.getElementById('loading-overlay');
            if (show) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        function openModal(modalId) { document.getElementById(modalId).classList.remove('hidden'); }
        function closeModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }
        function confirmAction(message, callback) { if(confirm(message)) callback(); }
    </script>
</body>
</html>
